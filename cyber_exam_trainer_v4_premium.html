<html lang="es">

    .wrap { max-width:1280px; margin:0 auto; padding:20px; }
    .hidden { display:none !important; }
    .card { background:#fff; border:1px solid var(--line); border-radius:24px; padding:20px; box-shadow:0 6px 18px rgba(15,23,42,.04); }

    .stats { display:grid; gap:12px; grid-template-columns:repeat(2,1fr); }
    .stat { border:1px solid var(--line); border-radius:20px; padding:16px; }

    .grid { display:grid; gap:16px; }

    .stack { display:flex; flex-direction:column; gap:12px; }

    .btn.warn { background:var(--warn); border-color:var(--warn); color:#fff; }

    .topic-box { border:1px solid var(--line); background:#f8fafc; padding:12px; border-radius:18px; }
    .form-grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); }
    label { font-size:13px; font-weight:700; color:#334155; display:block; margin-bottom:6px; }
    select,input[type="text"] { width:100%; border:1px solid var(--line); background:#fff; border-radius:14px; padding:12px 14px; font:inherit; }
    .question-card { background:#fff; border:1px solid var(--line); border-radius:24px; padding:22px; }
    .option { width:100%; text-align:left; border:1px solid var(--line); background:#f8fafc; border-radius:18px; padding:14px 16px; cursor:pointer; font:inherit; line-height:1.5; }

    .option.wrong { background:var(--badbg); color:var(--bad); border-color:#fca5a5; }

    .nav-dot { border:1px solid var(--line); border-radius:12px; background:#f8fafc; padding:10px 0; font-weight:700; cursor:pointer; }
    .nav-dot.current { background:#111827; color:#fff; border-color:#111827; }
    .nav-dot.done { background:#dcfce7; color:#166534; border-color:#86efac; }
    .nav-dot.flagged { outline:3px solid #fef3c7; }
    .review-card { border:1px solid var(--line); border-radius:24px; padding:18px; background:#fff; }
    .review-card.bad { border-color:#fecaca; }

    .kicker { font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#475569; }
    .big-number { font-size:28px; font-weight:800; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .accent-box { border-radius:22px; padding:16px; border:1px solid #ddd6fe; background:#faf5ff; }
    .danger-box { border-radius:18px; padding:14px; border:1px solid #fecaca; background:#fff1f2; color:#9f1239; }
    .good-box { border-radius:18px; padding:14px; border:1px solid #bbf7d0; background:#f0fdf4; color:#166534; }

  </style>
</head>

>${t.name}</div><div class="muted" style="font-size:13px;">${QUESTIONS.filter(q=>q.subject===s.id && q.topic===t.id).length} preguntas</div></div>`).join('')}</div><div class="spacer12"></div><div class="between"><div class="footer-note">${last ? `Último intento: ${last.percentage}%` : 'Sin intentos aún'}</div><div style="font-weight:800;">Entrar →</div></div></button>`; }).join('')}</div>`; menuView.querySelectorAll('[data-open]').forEach(btn => btn.onclick = () => { app.selectedSubject=btn.dataset.open; app.screen='subject'; render(); }); }
    function renderSubject(){ hideAll(); subjectView.classList.remove('hidden'); const s=subjectById[app.selectedSubject]; const st=getSubjectStats(s.id); const weakness=getWeaknessMap(s.id); const weakest=[...s.topics].map(t => { const w=weakness[t.id]; const rate=w ? Math.round(w.wrong*100/Math.max(1,w.total)) : 0; return {...t, rate}; }).sort((a,b)=>b.rate-a.rate); subjectView.innerHTML = `<div class="card between"><div><div class="kicker">Asignatura seleccionada</div><h2>${s.name}</h2><div class="spacer8"></div><div class="flex"><span class="pill">${st.total} preguntas</span><span class="pill premium">${st.premium} casos premium</span><span class="pill blue">${st.commands} de comandos</span></div></div><div class="toolbar"><button class="btn" id="backMenuBtn">Volver al menú</button><button class="btn" id="toBankBtn">Ver banco</button></div></div><div class="spacer16"></div><div class="grid" style="grid-template-columns:1.1fr .9fr;"><div class="card stack"><h3>Constructor de examen</h3><div class="muted">Puedes lanzar un simulacro clásico, un examen largo, un modo rebuscado o una tanda premium con casos prácticos.</div><div class="form-grid"><div><label>Modo</label><select id="modeSel"><option value="simulacro">Simulacro</option><option value="rebuscado">Rebuscado</option><option value="premium">Premium por casos</option><option value="comandos">Solo comandos</option><option value="adaptativo">Adaptativo por debilidades</option></select></div><div><label>Número de preguntas</label><select id="countSel"><option>20</option><option>40</option><option>60</option><option>100</option></select></div><div><label>Dificultad</label><select id="difficultySel"><option value="all">Todas</option><option value="media">Media</option><option value="dificil">Difícil</option><option value="muy_dificil">Muy difícil</option><option value="premium">Premium</option></select></div><div><label>Temporizador</label><select id="minutesSel"><option value="0">Sin límite</option><option value="15">15 min</option><option value="30">30 min</option><option value="45">45 min</option><option value="60">60 min</option></select></div><div><label>Bloque</label><select id="topicSel"><option value="all">Toda la asignatura</option>${s.topics.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div></div><div class="toolbar"><button class="btn primary" id="startExamBtn">Iniciar examen</button><button class="btn premium" id="quickPremiumBtn">Sorpréndeme con un premium</button><button class="btn warn" id="quickAdaptiveBtn">Repasar mis puntos débiles</button></div><div class="inline-note premium">Modo premium: mezcla casos situacionales, comparativas finas y preguntas más tramposas. Si una asignatura no tiene suficientes casos puros, completa con preguntas muy difíciles del mismo bloque.</div></div><div class="card stack"><h3>Radar de debilidades</h3><div class="muted">Se calcula con tus intentos guardados en este navegador.</div><div class="topics-grid">${weakest.map(t => `<div class="topic-box"><div style="font-weight:700;font-size:14px;">${t.name}</div><div class="muted" style="font-size:13px;">fallo estimado: ${t.rate}%</div></div>`).join('')}</div></div></div><div class="spacer16"></div><div class="card"><h3>Cobertura por tema</h3><div class="spacer12"></div><div class="topics-grid">${s.topics.map(t => { const qs=QUESTIONS.filter(q=>q.subject===s.id && q.topic===t.id); return `<div class="topic-box"><div style="font-weight:700;">${t.name}</div><div class="muted">${qs.length} preguntas · ${qs.filter(q=>q.kind==='case').length} premium · ${qs.filter(q=>q.kind==='command').length} comandos</div></div>`; }).join('')}</div></div>`; document.getElementById('backMenuBtn').onclick = () => { app.screen='menu'; app.selectedSubject=null; render(); }; document.getElementById('toBankBtn').onclick = () => { app.screen='bank'; render(); }; document.getElementById('startExamBtn').onclick = () => startExam(s.id, { mode:document.getElementById('modeSel').value, count:+document.getElementById('countSel').value, difficulty:document.getElementById('difficultySel').value, minutes:+document.getElementById('minutesSel').value, onlyTopic:document.getElementById('topicSel').value }); document.getElementById('quickPremiumBtn').onclick = () => startExam(s.id, { mode:'premium', count:20, difficulty:'all', minutes:30, onlyTopic:'all' }); document.getElementById('quickAdaptiveBtn').onclick = () => startExam(s.id, { mode:'adaptativo', count:20, difficulty:'all', minutes:20, onlyTopic:'all' }); }
    function renderExam(){ hideAll(); examView.classList.remove('hidden'); const ex=app.currentExam; const q=ex.questions[app.currentIndex]; const answeredCount=ex.questions.filter(x => app.answers[x.id] !== undefined).length; const timeLeft=ex.endsAt ? Math.max(0, Math.round((ex.endsAt - Date.now())/1000)) : null; examView.innerHTML = `<div class="card between"><div><div class="kicker">${subjectById[ex.subjectId].name}</div><h2>${q.prompt}</h2><div class="spacer8"></div><div class="flex"><span class="pill">Pregunta ${app.currentIndex+1} / ${ex.questions.length}</span><span class="pill ${q.kind==='case'?'premium':''}">${q.kind==='case'?'Caso premium':q.kind==='command'?'Comando/Práctica':'Clásica'}</span><span class="pill">${q.difficulty.replace('_',' ')}</span><span class="pill">${getTopicName(q.subject,q.topic)}</span></div></div><div class="stats" style="min-width:320px;"><div class="stat"><div class="muted">Respondidas</div><div class="big-number">${answeredCount}</div></div><div class="stat"><div class="muted">Marcadas</div><div class="big-number">${Object.values(app.flagged).filter(Boolean).length}</div></div><div class="stat"><div class="muted">Modo</div><div style="font-weight:800;text-transform:capitalize;">${ex.cfg.mode}</div></div><div class="stat"><div class="muted">Tiempo</div><div class="big-number">${timeLeft===null?'∞':durationLabel(timeLeft)}</div></div></div></div><div class="spacer16"></div><div class="question-card stack"><div class="toolbar"><button class="btn small" id="flagBtn">${app.flagged[q.id] ? 'Quitar marca' : 'Marcar para revisar'}</button><button class="btn small" id="backSubjectBtn">Salir del examen</button></div><div class="grid">${q.options.map((opt,i)=>`<button class="option ${app.answers[q.id]===i?'selected':''}" data-opt="${i}"><strong>${String.fromCharCode(65+i)}.</strong> ${opt}</button>`).join('')}</div><div class="between"><div class="footer-note">Atajos: A/B/C/D para responder, flechas ← → para moverte, F para marcar.</div><div class="toolbar"><button class="btn" id="prevBtn" ${app.currentIndex===0?'disabled':''}>Anterior</button><button class="btn" id="nextBtn">${app.currentIndex===ex.questions.length-1?'Ir al final':'Siguiente'}</button><button class="btn good" id="finishBtn">Corregir examen</button></div></div></div><div class="spacer16"></div><div class="card"><h3>Navegador rápido</h3><div class="spacer12"></div><div class="navigator">${ex.questions.map((item,i)=>`<button class="nav-dot ${i===app.currentIndex?'current':''} ${app.answers[item.id]!==undefined?'done':''} ${app.flagged[item.id]?'flagged':''}" data-go="${i}">${i+1}</button>`).join('')}</div></div>`; examView.querySelectorAll('[data-opt]').forEach(btn => btn.onclick = () => { app.answers[q.id] = +btn.dataset.opt; renderExam(); }); document.getElementById('flagBtn').onclick = () => { app.flagged[q.id] = !app.flagged[q.id]; renderExam(); }; document.getElementById('backSubjectBtn').onclick = () => { if(confirm('¿Salir del examen actual?')){ if(app.timerHandle) clearInterval(app.timerHandle); app.currentExam=null; app.screen='subject'; render(); } }; document.getElementById('prevBtn').onclick = () => { app.currentIndex=Math.max(0, app.currentIndex-1); renderExam(); }; document.getElementById('nextBtn').onclick = () => { app.currentIndex=Math.min(ex.questions.length-1, app.currentIndex+1); renderExam(); }; document.getElementById('finishBtn').onclick = () => finishExam(false); examView.querySelectorAll('[data-go]').forEach(btn => btn.onclick = () => { app.currentIndex = +btn.dataset.go; renderExam(); }); }
    function renderResult(){ hideAll(); resultView.classList.remove('hidden'); const r=app.result; const exQuestions=QUESTIONS.filter(q => r.questionIds.includes(q.id)); const byId=Object.fromEntries(exQuestions.map(q => [q.id,q])); const wrong=r.questionResults.filter(x=>!x.correct); const hardestFails=wrong.filter(x => ['muy_dificil','premium'].includes(x.difficulty)).length; resultView.innerHTML = `<div class="card between"><div><div class="kicker">Resultado</div><h2>${subjectById[r.subjectId].name}</h2><div class="spacer8"></div><div class="flex"><span class="pill good">${r.score} / ${r.total}</span><span class="pill premium">${r.percentage}%</span><span class="pill">${r.mode}</span>${r.autoSubmitted?'<span class="pill" style="background:#fff1f2;border-color:#fecdd3;color:#be123c;">Autocorregido por tiempo</span>':''}</div></div><div class="stats" style="min-width:340px;"><div class="stat"><div class="muted">Tiempo usado</div><div class="big-number">${durationLabel(r.elapsedSec)}</div></div><div class="stat"><div class="muted">Fallos duros</div><div class="big-number">${hardestFails}</div></div><div class="stat"><div class="muted">Marcadas</div><div class="big-number">${Object.values(r.flagged || {}).filter(Boolean).length}</div></div><div class="stat"><div class="muted">Fecha</div><div style="font-weight:800;">${formatDate(r.finishedAt)}</div></div></div></div><div class="spacer16"></div><div class="toolbar"><button class="btn primary" id="repeatBtn">Repetir esta selección</button><button class="btn warn" id="wrongBtn">Repasar solo fallos</button><button class="btn premium" id="adaptiveBtn">Nuevo adaptativo</button><button class="btn" id="backSubjectFromResult">Volver a asignatura</button></div><div class="spacer16"></div><div class="grid" style="grid-template-columns:1fr 1fr;"><div class="card"><h3>Resultado por bloques</h3><div class="spacer12"></div><div class="topics-grid">${r.topicBreakdown.map(t => `<div class="topic-box"><div style="font-weight:700;">${getTopicName(r.subjectId,t.topic)}</div><div class="muted">${t.correct} / ${t.total} · ${Math.round(t.correct*100/t.total)}%</div></div>`).join('')}</div></div><div class="card"><h3>Lectura rápida</h3><div class="spacer12"></div><div class="inline-note blue">Las preguntas premium y las muy difíciles pesan más en tu sensación de examen real. Si has fallado varias ahí, el modo adaptativo te conviene más que repetir un simulacro clásico.</div><div class="spacer12"></div><div class="good-box">Aciertos: ${r.score} · Fallos: ${r.total-r.score} · Último intento guardado localmente para personalizar repasos.</div></div></div><div class="spacer16"></div><div class="stack"><h3>Revisión detallada</h3>${r.questionResults.map((res,idx) => { const q=byId[res.id]; return `<div class="review-card ${res.correct?'good':'bad'}"><div class="flex"><span class="pill">${idx+1}</span><span class="pill">${getTopicName(q.subject,q.topic)}</span><span class="pill ${q.kind==='case'?'premium':''}">${q.kind==='case'?'Caso premium':q.kind==='command'?'Comando':'Clásica'}</span><span class="pill">${q.difficulty.replace('_',' ')}</span><span class="pill ${res.correct?'good':''}">${res.correct?'Correcta':'Incorrecta'}</span></div><div class="spacer8"></div><div style="font-weight:800; line-height:1.5;">${q.prompt}</div><div class="spacer12"></div><div class="stack">${q.options.map((opt,i)=>`<div class="option ${i===q.answer?'correct':''} ${res.chosen===i && i!==q.answer?'wrong':''}" style="cursor:default;"><strong>${String.fromCharCode(65+i)}.</strong> ${opt}${i===q.answer?' · correcta':''}${res.chosen===i && i!==q.answer?' · tu respuesta':''}</div>`).join('')}</div>${!res.correct ? `<div class="spacer12"></div><div class="inline-note warn"><strong>Explicación:</strong> ${q.explanation}</div>` : ''}</div>`; }).join('')}</div>`; document.getElementById('repeatBtn').onclick = () => repeatExam(r); document.getElementById('wrongBtn').onclick = () => reviewWrong(r); document.getElementById('adaptiveBtn').onclick = () => startExam(r.subjectId, { mode:'adaptativo', count:20, difficulty:'all', minutes:20, onlyTopic:'all' }); document.getElementById('backSubjectFromResult').onclick = () => { app.screen='subject'; app.selectedSubject=r.subjectId; app.result=null; render(); }; }
    function renderHistory(){ hideAll(); historyView.classList.remove('hidden'); const items=[...app.history].reverse(); historyView.innerHTML = `<div class="card between"><div><div class="kicker">Historial</div><h2>Intentos guardados</h2></div><div class="muted">${items.length} intento(s)</div></div><div class="spacer16"></div><div class="stack">${items.length ? items.map(item => `<div class="history-item"><div class="between"><div><div style="font-weight:800;">${subjectById[item.subjectId].name}</div><div class="muted">${item.mode} · ${item.score}/${item.total} · ${item.percentage}% · ${formatDate(item.finishedAt)}</div></div><div class="toolbar"><button class="btn small" data-repeat="${item.id}">Repetir</button><button class="btn small" data-review="${item.id}">Repasar fallos</button></div></div><div class="spacer12"></div><div class="flex">${item.topicBreakdown.map(t=>`<span class="pill">${getTopicName(item.subjectId,t.topic)} · ${t.correct}/${t.total}</span>`).join('')}</div></div>`).join('') : '<div class="card">Aún no hay intentos guardados.</div>'}</div>`; historyView.querySelectorAll('[data-repeat]').forEach(btn => btn.onclick = () => { const item=app.history.find(x=>x.id===btn.dataset.repeat); if(item) repeatExam(item); }); historyView.querySelectorAll('[data-review]').forEach(btn => btn.onclick = () => { const item=app.history.find(x=>x.id===btn.dataset.review); if(item) reviewWrong(item); }); }
    function renderBank(){ hideAll(); bankView.classList.remove('hidden'); const f=app.bankFilters; let filtered=QUESTIONS.filter(q => (f.subject==='all' || q.subject===f.subject) && (f.difficulty==='all' || q.difficulty===f.difficulty || (f.difficulty==='premium' && q.kind==='case')) && (f.kind==='all' || q.kind===f.kind)); if(f.q.trim()){ const s=f.q.trim().toLowerCase(); filtered=filtered.filter(q => (q.prompt + ' ' + q.explanation + ' ' + q.options.join(' ')).toLowerCase().includes(s)); } bankView.innerHTML = `<div class="card stack"><div><div class="kicker">Banco</div><h2>Explorador premium de preguntas</h2></div><div class="form-grid"><div><label>Búsqueda</label><input id="bankSearch" type="text" value="${f.q.replace(/"/g,'&quot;')}" placeholder="Comando, concepto, sigla..."></div><div><label>Asignatura</label><select id="bankSubject"><option value="all">Todas</option>${SUBJECTS.map(s=>`<option value="${s.id}" ${f.subject===s.id?'selected':''}>${s.name}</option>`).join('')}</select></div><div><label>Dificultad</label><select id="bankDifficulty"><option value="all">Todas</option><option value="media" ${f.difficulty==='media'?'selected':''}>Media</option><option value="dificil" ${f.difficulty==='dificil'?'selected':''}>Difícil</option><option value="muy_dificil" ${f.difficulty==='muy_dificil'?'selected':''}>Muy difícil</option><option value="premium" ${f.difficulty==='premium'?'selected':''}>Premium</option></select></div><div><label>Tipo</label><select id="bankKind"><option value="all">Todos</option><option value="standard" ${f.kind==='standard'?'selected':''}>Clásicas</option><option value="command" ${f.kind==='command'?'selected':''}>Comandos</option><option value="case" ${f.kind==='case'?'selected':''}>Casos premium</option></select></div></div><div class="between"><div class="muted">${filtered.length} resultado(s)</div><button class="btn" id="applyBankBtn">Aplicar filtros</button></div></div><div class="spacer16"></div><div class="stack">${filtered.slice(0,180).map(q=>`<div class="review-card"><div class="flex"><span class="pill">${subjectById[q.subject].name}</span><span class="pill">${getTopicName(q.subject,q.topic)}</span><span class="pill ${q.kind==='case'?'premium':''}">${q.kind}</span><span class="pill">${q.difficulty.replace('_',' ')}</span></div><div class="spacer8"></div><div style="font-weight:800;line-height:1.5;">${q.prompt}</div><div class="spacer8"></div><div class="stack">${q.options.map((o,i)=>`<div class="option ${i===q.answer?'correct':''}" style="cursor:default;"><strong>${String.fromCharCode(65+i)}.</strong> ${o}</div>`).join('')}</div><div class="spacer8"></div><div class="inline-note blue"><strong>Explicación:</strong> ${q.explanation}</div></div>`).join('')}</div>`; document.getElementById('applyBankBtn').onclick = () => { app.bankFilters = { q:document.getElementById('bankSearch').value, subject:document.getElementById('bankSubject').value, difficulty:document.getElementById('bankDifficulty').value, kind:document.getElementById('bankKind').value }; renderBank(); }; }
    document.addEventListener('keydown', (ev) => { if(app.screen!=='exam' || !app.currentExam) return; const q=app.currentExam.questions[app.currentIndex]; const key=ev.key.toLowerCase(); if(['a','b','c','d'].includes(key)){ app.answers[q.id] = ['a','b','c','d'].indexOf(key); renderExam(); } if(ev.key==='ArrowRight'){ app.currentIndex=Math.min(app.currentExam.questions.length-1, app.currentIndex+1); renderExam(); } if(ev.key==='ArrowLeft'){ app.currentIndex=Math.max(0, app.currentIndex-1); renderExam(); } if(key==='f'){ app.flagged[q.id] = !app.flagged[q.id]; renderExam(); } });
    function render(){ renderTabs(); if(app.screen==='menu') return renderMenu(); if(app.screen==='subject') return renderSubject(); if(app.screen==='exam') return renderExam(); if(app.screen==='result') return renderResult(); if(app.screen==='history') return renderHistory(); if(app.screen==='bank') return renderBank(); renderMenu(); }
    render();
  </script>
</body>
</html>
